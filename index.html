<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  text-align:center;
  margin-top:50px;
  font-family:Arial;
}
.btn-musica{
  background: transparent;
  border: none;
  color: #1A1402 /*#D4AF37;  Color del ícono */
  font-size: 45px;
  padding: 0;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.btn-musica:hover{
  color: #59450b /*#b8901f;*/
}
.btn-musicaoriginal{
  background:#D4AF37;
  color:white;
  border:none;
  padding:15px 30px;
  border-radius:25px;
  font-size:18px;
  cursor:pointer;
}
</style>

</head>

<body>
<button class="btn-musica" onclick="Reproduce()">▶Reproducir</button>

<audio id="miAudio">
    <source src="sonido.mpeg" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("miAudio");
const boton = document.querySelector(".btn-musica");

//boton.addEventListener("click", togglePlay);

function Reproduce() {
    if (audio.paused) {
        audio.play();
        boton.textContent = "⏸ Pausar";
    } else {
        audio.pause();
        boton.textContent = "▶ Reproducir";
    }
}
</script>
