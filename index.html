<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:flex-end;
}

.btn-musica{
  background: transparent;
  border: none;
  color: #1A1402;
  font-size: 90px;
  cursor: pointer;
  margin-bottom: 20px;
}

.btn-musica:hover{
  color: #59450b;
}
  
 

</style>

</head>

<body>
<button class="btn-musica" onclick="Reproduce()">▶</button>

<audio id="miAudio">
    <source src="sonido.mpeg" type="audio/mpeg">
</audio>

<script>
const audio = document.getElementById("miAudio");
const boton = document.querySelector(".btn-musica");

//boton.addEventListener("click", togglePlay);

function Reproduce() {
    if (audio.paused) {
        audio.play();
        boton.textContent = "⏸";
    } else {
        audio.pause();
        boton.textContent = "▶";
    }
}
</script>
